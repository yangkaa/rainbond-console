name: orchestrator-stage-console

on:
  workflow_call:
    inputs:
      feature_id:
        required: true
        type: string
      engine:
        required: true
        type: string
      strict_verify:
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      feature_id:
        description: Feature ID (e.g. RB-123)
        required: true
        type: string
      engine:
        description: Engine used by orchestrator
        required: true
        default: opencode
        type: choice
        options:
          - opencode
          - claude
      strict_verify:
        description: Run stricter verification commands
        required: true
        default: false
        type: boolean

jobs:
  verify-console:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: yangkaa/rainbond-console
          ref: workflow

      - name: Execute Console stage checks
        id: verify_console
        shell: bash
        run: |
          set -uo pipefail
          FEATURE_ID="${{ inputs.feature_id }}"
          ENGINE="${{ inputs.engine }}"
          STRICT="${{ inputs.strict_verify }}"

          mkdir -p /tmp/orchestrator
          RAW_LOG="/tmp/orchestrator/raw-console-${FEATURE_ID}.log"
          SUMMARY_JSON="/tmp/orchestrator/verify-summary-console-${FEATURE_ID}.json"

          {
            echo "feature_id=${FEATURE_ID}"
            echo "engine=${ENGINE}"
            echo "strict_verify=${STRICT}"
            echo "repo=rainbond-console"
            echo "stage=console"
            echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "pwd=$(pwd)"
            ls -la
          } > "${RAW_LOG}"

          rc=0
          if [[ "${STRICT}" == "true" ]]; then
            {
              echo "running: python3 --version"
              python3 --version
              echo "running: python3 -m py_compile manage.py"
              python3 -m py_compile manage.py
              echo "strict_verify note: replace with full yapf/flake8/pytest command set"
            } >> "${RAW_LOG}" 2>&1 || rc=$?
          else
            {
              echo "running: python3 --version"
              python3 --version
              echo "running: python3 -m py_compile manage.py"
              python3 -m py_compile manage.py
            } >> "${RAW_LOG}" 2>&1 || rc=$?
          fi

          status="passed"
          if [[ "${rc}" -ne 0 ]]; then
            status="failed"
          fi

          cat > "${SUMMARY_JSON}" <<JSON
          {
            "feature_id": "${FEATURE_ID}",
            "repo": "rainbond-console",
            "stage": "console",
            "engine": "${ENGINE}",
            "strict_verify": ${STRICT},
            "status": "${status}"
          }
          JSON

          echo "rc=${rc}" >> "$GITHUB_OUTPUT"
          cat "${SUMMARY_JSON}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload raw console verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-raw-console-${{ inputs.feature_id }}
          path: /tmp/orchestrator/raw-console-${{ inputs.feature_id }}.log

      - name: Upload console summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-summary-console-${{ inputs.feature_id }}
          path: /tmp/orchestrator/verify-summary-console-${{ inputs.feature_id }}.json

      - name: Print raw console log to summary
        if: always()
        shell: bash
        run: |
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          cat "/tmp/orchestrator/raw-console-${{ inputs.feature_id }}.log" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when console checks failed
        if: steps.verify_console.outputs.rc != '0'
        run: exit 1
